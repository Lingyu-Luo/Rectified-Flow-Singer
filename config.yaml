# RFSinger Configuration
# All hyperparameters for preprocessing, training, and inference.

# =============================================================================
# Experiment
# =============================================================================
experiment:
  name: "opencpop-rf"        # Used as the checkpoint folder name under checkpoint.output_dir
  seed: 42

# =============================================================================
# Data
# =============================================================================
data:
  # Single-speaker fallback (used when `speakers` is empty/null).
  raw_data_path: "./data/opencpop/wavs"
  csv_path: "./data/opencpop/transcriptions.csv"
  processed_dir: "./processed_data"

  # Multi-speaker / multi-dataset training. When `speakers` is non-empty it
  # overrides raw_data_path / csv_path. Add one entry per speaker.
  # Example:
  #   speakers:
  #     opencpop:
  #       raw_data_path: "./data/opencpop/wavs"
  #       csv_path: "./data/opencpop/transcriptions.csv"
  speakers: {}

# =============================================================================
# Audio
# =============================================================================
audio:
  sample_rate: 44100
  n_fft: 2048
  hop_length: 512
  win_length: 2048
  n_mels: 128
  fmin: 40
  fmax: 16000             # Must match the NSF-HiFiGAN vocoder's fmax

# =============================================================================
# F0 (pitch) extraction
# =============================================================================
f0:
  method: "rmvpe"       # "harvest" or "rmvpe"
  use_log_f0: true
  f0_floor: 50.0
  f0_ceil: 1100.0
  rmvpe_ckpt: "./ckpts/rmvpe.pt"

# =============================================================================
# Model
# =============================================================================
model:
  # FastSpeech2 encoder
  d_model: 512
  n_encoder_layers: 8
  n_head: 4
  dropout: 0.1

  # Speaker conditioning (active when speakers > 1)
  use_speaker_embedding: true
  speaker_embedding_dim: 256

  # Coarse mel decoder (CNN-Transformer-CNN)
  coarse_n_layers: 4
  coarse_n_head: 2
  coarse_conv_channels: 512
  coarse_kernel_size: 5

  # Rectified flow decoder
  mel_channels: 128       # Must match audio.n_mels
  flow_hidden: 512
  n_flow_layers: 20

# =============================================================================
# Training
# =============================================================================
training:
  epochs: 500
  batch_size: 32
  num_workers: 16

  # Optimizer
  learning_rate: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.98]

  # Scheduler
  scheduler: "cosine"     # "cosine", "step", "none"
  lr_min_ratio: 0.1
  warmup_steps: 1000

  # Stability
  grad_clip: 1.0
  use_amp: true           # Automatic mixed precision (GPU only)

  # EMA
  use_ema: true
  ema_decay: 0.9999

  # Loss weights
  loss_weights:
    flow: 1.0
    coarse: 0.2

  # Validation
  val_ratio: 0.05         # 0 disables validation
  val_interval: 5

  # Iterative rectified flow
  reflow:
    n_steps: 10
    freeze_encoder: true
    loss_weights:
      flow: 1.0
      coarse: 0.0

# =============================================================================
# Augmentation
# =============================================================================
augmentation:
  enabled: false
  num_augmented_copies: 2

  time_stretch:
    enabled: true
    min_rate: 0.8
    max_rate: 1.2

  pitch_shift:
    enabled: true
    min_semitones: -3
    max_semitones: 3

  online:
    enabled: false
    f0_jitter: 0.05
    mel_noise_std: 0.02
    time_mask_max_len: 10
    freq_mask_max_bins: 8

# =============================================================================
# Checkpointing & logging
# =============================================================================
checkpoint:
  output_dir: "./ckpts"
  save_interval: 10
  keep_last_n: 5
  save_best: true

logging:
  log_interval: 100

# =============================================================================
# Inference
# =============================================================================
inference:
  n_steps: 50
  vocoder: "nsf_hifigan"  # "nsf_hifigan", "pyworld", "griffin_lim", "none"
  vocoder_config: "./ckpts/nsf_hifigan/config.json"
  vocoder_ckpt: "./ckpts/nsf_hifigan/model.ckpt"
  output_dir: "./outputs"
